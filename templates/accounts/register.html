{% extends 'base.html' %}

{% block title %}Register — HealthAI{% endblock %}

{% block content %}
<div style="display:flex;justify-content:center;padding:60px 24px">
    <div class="card" style="width:100%;max-width:420px">

        <div style="text-align:center;margin-bottom:28px">
            <div style="font-size:48px;margin-bottom:12px">✨</div>
            <h2 style="font-family:'Space Grotesk',sans-serif;font-size:1.8rem">Create account</h2>
            <p style="color:#64748b;margin-top:6px;font-size:14px">Join HealthAI — it's free!</p>
        </div>

        <form method="POST" style="display:flex;flex-direction:column;gap:16px">
            {% csrf_token %}

            <div>
                <label style="font-size:13px;color:#94a3b8;display:block;margin-bottom:6px">Username</label>
                <input type="text" name="username" required
                    style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);
                    color:#e2e8f0;padding:12px 16px;border-radius:10px;font-size:14px;
                    font-family:'Inter',sans-serif;outline:none"
                    placeholder="Choose a username">
            </div>

            <div>
                <label style="font-size:13px;color:#94a3b8;display:block;margin-bottom:6px">Email</label>
                <input type="email" name="email" required
                    style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);
                    color:#e2e8f0;padding:12px 16px;border-radius:10px;font-size:14px;
                    font-family:'Inter',sans-serif;outline:none"
                    placeholder="Your email address">
            </div>

            <div>
                <label style="font-size:13px;color:#94a3b8;display:block;margin-bottom:6px">Password</label>
                <input type="password" name="password1" required
                    style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);
                    color:#e2e8f0;padding:12px 16px;border-radius:10px;font-size:14px;
                    font-family:'Inter',sans-serif;outline:none"
                    placeholder="Create a password">
            </div>

            <div>
                <label style="font-size:13px;color:#94a3b8;display:block;margin-bottom:6px">Confirm Password</label>
                <input type="password" name="password2" required
                    style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);
                    color:#e2e8f0;padding:12px 16px;border-radius:10px;font-size:14px;
                    font-family:'Inter',sans-serif;outline:none"
                    placeholder="Confirm your password">
            </div>

            <button type="submit" class="btn-primary" style="width:100%;padding:13px">
                Create Account
            </button>
        </form>

        <p style="text-align:center;margin-top:20px;font-size:14px;color:#64748b">
            Already have an account?
            <a href="/accounts/login/" style="color:#a78bfa">Login</a>
        </p>

    </div>
</div>
{% endblock %}
